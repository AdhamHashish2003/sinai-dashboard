# PermitAI content config — Content Flywheel module
#
# Edit this file to change post rotation, target platforms, or city pool
# without touching worker code.

post_types:
  - city_report
  - fee_comparison
  - adu_case_study

# Day-of-week round robin (0 = Mon, 6 = Sun)
# Mon/Wed/Fri = city_report, Tue/Thu = fee_comparison, Sat = adu_case_study, Sun = skip
rotation:
  0: city_report      # Mon
  1: fee_comparison   # Tue
  2: city_report      # Wed
  3: fee_comparison   # Thu
  4: city_report      # Fri
  5: adu_case_study   # Sat
  6: null             # Sun — skip

target_platforms:
  - reddit
  - linkedin
  - biggerpockets

# Hardcoded top 25 California metros with population (2020 census).
# Log-scaled weighting is applied in the worker so medium cities still show up.
# When HUD FMR data becomes available, swap to dynamic weighting from the cities table.
